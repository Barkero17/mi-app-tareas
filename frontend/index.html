<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manejador de Tareas - Proyecto Intermodular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="login-screen" class="auth-container">
        <div class="card">
            <div class="logo">🕒</div>
            <h2>Iniciar sesión</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Iniciar sesión</button>
            </form>
            <p>¿No tienes cuenta? <a href="#" onclick="showScreen('register-screen')">Regístrate</a> [cite: 115]</p>
        </div>
    </section>

    <section id="register-screen" class="auth-container" style="display:none;">
        <div class="card">
            <div class="logo">🕒</div>
            <h2>Registro</h2>
            <form id="register-form">
                <input type="text" id="reg-nombre" placeholder="Nombre" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-pass" placeholder="Contraseña" required>
                <input type="password" id="reg-confirm" placeholder="Confirmar contraseña" required>
                <button type="submit" class="btn-primary">Crear cuenta</button>
            </form>
            <p><a href="#" onclick="showScreen('login-screen')">Volver al login</a> [cite: 143]</p>
        </div>
    </section>

    <section id="dashboard" style="display:none;">
        <nav class="navbar">
            <span class="logo">🕒 Manejador de Tareas</span>
            <button onclick="logout()" class="btn-link">Cerrar sesión</button> [cite: 22, 51]
        </nav>

        <main class="container">
            <div class="controls">
                <button class="btn-primary" onclick="openModal()">+ Nueva tarea</button> [cite: 48, 66]
                <div class="filters">
                    <button class="active" onclick="cargarTareas('todas')">Todas</button> [cite: 52, 75]
                    <button onclick="cargarTareas('pendiente')">Pendientes</button> [cite: 53, 76]
                    <button onclick="cargarTareas('completada')">Completadas</button> [cite: 54, 77]
                </div>
            </div>

            <div id="task-list" class="task-list">
                </div>
        </main>
    </section>

    <div id="task-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-title">Nueva Tarea</h3>
            <form id="task-form">
                <input type="text" id="task-title" placeholder="Título" required>
                <textarea id="task-desc" placeholder="Descripción"></textarea>
                <div class="form-row">
                    <input type="date" id="task-date" required>
                    <select id="task-priority">
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button> [cite: 27, 67]
                    <button type="button" onclick="closeModal()" class="btn-secondary">Cancelar</button> [cite: 68]
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
