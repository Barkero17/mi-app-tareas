<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App de Tareas - DAW</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Un poco de estilo rápido para separar los formularios */
        body { font-family: sans-serif; display: flex; justify-content: center; gap: 50px; margin-top: 50px; }
        .auth-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        h2 { text-align: center; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="******" required>
            
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div class="auth-container">
        <h2>Registro</h2>
        <form id="registro-form">
            <label for="reg-email">Email:</label>
            <input type="email" id="reg-email" placeholder="nuevo@correo.com" required>
            
            <label for="reg-password">Contraseña:</label>
            <input type="password" id="reg-password" placeholder="Mín. 6 caracteres" required>
            
            <button type="submit" style="background-color: #007bff;">Crear Cuenta</button>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
