<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Tareas Avanzadas</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos generales del fondo y contenedor */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center;}
        .dashboard-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 600px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Formulario tipo Grid para que los campos queden ordenados */
        #form-tarea { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px;}
        #nueva-tarea { grid-column: 1 / 3; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="date"], input[type="time"], select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Botones generales */
        .btn-add { grid-column: 1 / 3; background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-logout { background-color: #333; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-delete-all { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-borrar { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;}
        
        /* Lista de tareas individual */
        .tarea-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 4px; background: white; }
        .tarea-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .tarea-texto { font-weight: bold; }
        .tarea-detalles { font-size: 0.8em; color: #555; }
        
        /* Estilos especiales cuando la tarea está completada (tachado) */
        .completada .tarea-texto { text-decoration: line-through; color: #888; }
        .completada { opacity: 0.7; background: #f0f0f0; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h2>📝 Mis Tareas</h2>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>

        <form id="form-tarea">
            <input type="text" id="nueva-tarea" placeholder="¿Qué tienes que hacer?" required autocomplete="off">
            <input type="date" id="fecha-tarea" required>
            <input type="time" id="hora-tarea" required>
            <select id="prioridad-tarea">
                <option value="Baja">Prioridad Baja</option>
                <option value="Media" selected>Prioridad Media</option>
                <option value="Alta">Prioridad Alta</option>
            </select>
            <button type="submit" class="btn-add">Añadir Tarea</button>
        </form>

        <div id="lista-tareas"></div>
        
        <button class="btn-delete-all" onclick="borrarTodas()">🗑️ Borrar Todas las Tareas</button>
    </div>

    <script src="js/tareas.js"></script>
</body>
</html>
