<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manejador de Tareas - Proyecto Intermodular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="login-screen" class="auth-container">
        <div class="card">
            <div class="logo">🕒</div> <h2>Iniciar sesión</h2>
            <form id="login-form">
                <input type="email" placeholder="Email" required> <input type="password" placeholder="Contraseña" required> <button type="submit" class="btn-primary">Iniciar sesión</button> </form>
            <p>¿No tienes cuenta? <a href="#" onclick="showScreen('register-screen')">Regístrate</a></p> </div>
    </section>

    <section id="register-screen" class="auth-container" style="display:none;">
        <div class="card">
            <div class="logo">🕒</div>
            <h2>Registro</h2>
            <form id="register-form">
                <input type="text" placeholder="Nombre" required> <input type="email" placeholder="Email" required> <input type="password" placeholder="Contraseña" required> <input type="password" placeholder="Confirmar contraseña" required> <button type="submit" class="btn-primary">Crear cuenta</button> </form>
            <p><a href="#" onclick="showScreen('login-screen')">Volver al login</a></p>
        </div>
    </section>

    <section id="dashboard" style="display:none;">
        <nav class="navbar">
            <span class="logo">🕒 Manejador de Tareas</span> <button onclick="logout()" class="btn-link">Cerrar sesión</button> </nav>

        <main class="container">
            <div class="controls">
                <button class="btn-primary" onclick="openModal()">+ Nueva tarea</button> 
                
                <div class="filters">
                    <button class="active" onclick="filtrar('todas')">Todas</button>
                    <button onclick="filtrar('pendientes')">Pendientes</button>
                    <button onclick="filtrar('completadas')">Completadas</button>
                </div>
            </div>

            <div id="task-list" class="task-list">
                </div>
        </main>
    </section>

    <div id="task-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-title">Nueva Tarea</h3>
            <form id="task-form">
                <input type="text" id="task-title" placeholder="Título" required> <textarea id="task-desc" placeholder="Descripción"></textarea> <div class="form-row">
                    <input type="date" id="task-date" required> <select id="task-priority"> <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button> <button type="button" onclick="closeModal()" class="btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
